# Render Deployment Configuration for Credit Sentinel Backend

services:
  - type: web
    name: credit-sentinel-api
    runtime: python
    rootDir: backend-python
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    runtimeSource:
      type: static
      value: 3.11.9
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: COSMOS_ENDPOINT
        sync: false
      - key: COSMOS_KEY
        sync: false
      - key: COSMOS_DATABASE
        value: CreditSentinelDB
      - key: STORAGE_ACCOUNT_NAME
        sync: false
      - key: STORAGE_ACCOUNT_KEY
        sync: false
      - key: STORAGE_CONNECTION_STRING
        sync: false
      - key: STORAGE_CONTAINER
        value: ctos-pdfs
      - key: DOC_INTEL_ENDPOINT
        sync: false
      - key: DOC_INTEL_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-08-01-preview
      - key: DEMO_AUTH_TOKEN
        value: credit-officer-token
